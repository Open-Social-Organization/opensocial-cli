<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Social Network Page</title>
    <meta
      name="description"
      content="An Open Social Network page template for writing posts and publishing anywhere."
    />
    <link rel="icon" type="image/png" href="./assets/open-social-network-logo.png" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="alternate" type="application/json" href="./profile.json" title="Open Social Network profile" />
    <link rel="alternate" type="application/json" href="./feed.json" title="Open Social Network feed" />
  </head>
  <body>
    <main class="page-shell">
      <section class="banner-section" aria-label="Open Social Network page cover">
        <img src="./assets/open-social-network-logo.png" alt="" class="cover-mark" />
      </section>

      <section class="profile-hero">
        <img src="./assets/open-social-network-logo.png" alt="" class="profile-logo" />
        <div>
          <p class="network-label">Open Social Network Page</p>
          <h1 data-profile-name>Loading profile</h1>
          <p data-profile-bio></p>
        </div>
      </section>

      <section class="feed-section">
        <div class="section-header">
          <div>
            <h2>Posts</h2>
            <p>Published from this page and verified by Open Social Network.</p>
          </div>
          <span data-verification-status>Checking</span>
        </div>
        <div class="post-list" data-posts></div>
        <details class="technical-details">
          <summary>Technical details</summary>
          <a href="./profile.json">Profile file</a>
          <a href="./feed.json">Feed file</a>
          <a href="./opensocial/follows/index.json">Following file</a>
          <a href="./.well-known/open-social-network.json">Discovery file</a>
        </details>
      </section>

      <section class="follow-section" aria-label="Following">
        <div class="section-header">
          <div>
            <h2>Following</h2>
            <p>Pages this profile follows. This list can move with the page.</p>
          </div>
        </div>
        <div data-follows></div>
      </section>
    </main>

    <script type="module" src="./page.js"></script>
  </body>
</html>
